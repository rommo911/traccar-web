name: Build Project

on:
  push:
    branches: [ master , dev-easywan ]
  pull_request:
    branches: [ master  , dev-easywan ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        cache: npm
        cache-dependency-path: package-lock.json
    - run: npm ci
    - run: npm run build
